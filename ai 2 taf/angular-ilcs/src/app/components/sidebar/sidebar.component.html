<div class="d-flex flex-column h-100 bg-dark text-white border-end border-secondary" style="width:270px">

  <!-- Header -->
  <div class="d-flex align-items-center gap-2 p-3 border-bottom border-secondary">
    <div class="rounded-2 d-flex align-items-center justify-content-center bg-primary"
         style="width:34px;height:34px;font-size:16px">🤖</div>
    <span class="fw-semibold fs-6">Agent <span class="text-primary">ILCS</span></span>
  </div>

  <!-- Nav -->
  <div class="d-flex gap-2 p-2 border-bottom border-secondary">
    <button class="btn btn-sm flex-fill"
            [class.btn-primary]="currentView === 'chat'"
            [class.btn-outline-secondary]="currentView !== 'chat'"
            (click)="goTo('chat')">
      <i class="bi bi-chat-dots me-1"></i>Chat
    </button>
    <button class="btn btn-sm flex-fill"
            [class.btn-primary]="currentView === 'etudiants'"
            [class.btn-outline-secondary]="currentView !== 'etudiants'"
            (click)="goTo('etudiants')">
      <i class="bi bi-mortarboard me-1"></i>Étudiants
    </button>
  </div>

  <!-- New chat button -->
  <div class="p-2">
    <button class="btn btn-outline-primary btn-sm w-100" (click)="newChat()">
      <i class="bi bi-plus-lg me-1"></i>Nouvelle conversation
    </button>
  </div>

  <!-- Chat history -->
  <div class="flex-grow-1 overflow-auto px-2 pb-2">

    <!-- Today -->
    <ng-container *ngIf="chatService.todaySessions().length > 0">
      <p class="text-uppercase text-secondary" style="font-size:10px;letter-spacing:.08em;margin:8px 4px 4px">
        Aujourd'hui
      </p>
      <div *ngFor="let s of chatService.todaySessions()"
           class="d-flex align-items-center gap-2 px-2 py-2 rounded-2 mb-1 cursor-pointer position-relative sidebar-item"
           [class.active-session]="chatService.activeSessionId() === s.id"
           (click)="selectSession(s)">
        <i class="bi bi-chat text-secondary" style="font-size:13px;flex-shrink:0"></i>
        <span class="flex-grow-1 text-truncate" style="font-size:12.5px">{{ s.title }}</span>
        <button class="btn btn-sm p-0 border-0 text-secondary delete-btn"
                style="font-size:12px;width:20px;height:20px;line-height:1"
                (click)="deleteSession($event, s.id)">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </ng-container>

    <!-- Older -->
    <ng-container *ngIf="chatService.olderSessions().length > 0">
      <p class="text-uppercase text-secondary" style="font-size:10px;letter-spacing:.08em;margin:8px 4px 4px">
        Plus ancien
      </p>
      <div *ngFor="let s of chatService.olderSessions()"
           class="d-flex align-items-center gap-2 px-2 py-2 rounded-2 mb-1 cursor-pointer sidebar-item"
           [class.active-session]="chatService.activeSessionId() === s.id"
           (click)="selectSession(s)">
        <i class="bi bi-chat text-secondary" style="font-size:13px;flex-shrink:0"></i>
        <span class="flex-grow-1 text-truncate" style="font-size:12.5px">{{ s.title }}</span>
        <button class="btn btn-sm p-0 border-0 text-secondary delete-btn"
                style="font-size:12px;width:20px;height:20px;line-height:1"
                (click)="deleteSession($event, s.id)">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </ng-container>

    <!-- Empty -->
    <div *ngIf="chatService.sessions().length === 0"
         class="text-center text-secondary py-4" style="font-size:12px">
      <i class="bi bi-chat-square-dots d-block mb-2" style="font-size:24px"></i>
      Aucune conversation
    </div>
  </div>

  <!-- Footer -->
  <div class="p-3 border-top border-secondary">
    <div class="d-flex align-items-center gap-2">
      <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center fw-bold"
           style="width:30px;height:30px;font-size:12px">U</div>
      <div class="flex-grow-1 overflow-hidden">
        <div style="font-size:12.5px;font-weight:500">Utilisateur</div>
        <div class="text-secondary" style="font-size:10.5px">Agent ILCS</div>
      </div>
      <i class="bi bi-gear text-secondary"></i>
    </div>
  </div>

</div>
